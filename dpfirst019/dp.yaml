apiVersion: v1
kind: Namespace
metadata:
  name: first019
  labels:
    app.kubernetes.io/name: multi-container-project

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: delayed-ready-deployment
  labels:
    app: delayed-ready
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delayed-ready
  template:
    metadata:
      labels:
        app: delayed-ready
    spec:
      containers:
      - name: delayed-container
        image: nginx:latest # Puedes usar cualquier imagen ligera
        ports:
        - containerPort: 80
        # Configuración clave para el retraso
        livenessProbe:
          httpGet:
            path: /
            port: 80
          # El contenedor se considera fallido hasta que este tiempo haya transcurrido.
          # 5 minutos = 300 segundos
          initialDelaySeconds: 300
          # Usamos un alto valor de failureThreshold para evitar el reinicio.
          failureThreshold: 60
          periodSeconds: 5
