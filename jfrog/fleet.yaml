# fleet.yaml
defaultNamespace: jfrog-system
name: jfrog-jcr-deployment
namespace: jfrog-system
dependsON:
  - selector:
      matchLabels:
        app: longhorn

# Part 1: Create the JFrog-specific Issuer
definitions:
  - apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: jfrog-issuer
      namespace: jfrog-system
    spec:
      selfSigned: {}

# Part 2: Deploy Artifactory JCR with Bitnami Postgres Overrides
helm:
  repo: https://charts.jfrog.io
  chart: artifactory-jcr
  version: 107.90.10
  
  
 
