# values.yaml

# values.yaml

postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn"

# --- EVERYTHING FOR ARTIFACTORY MUST BE IN THIS ONE BLOCK ---
artifactory:
  nginx:
    enabled: false # This MUST be here to kill the 'Updating' Deployment in your screenshot
  
  service:
    type: ClusterIP # This MUST be here to kill the 'Pending' Service in your screenshot

  database:
    type: postgresql
    driver: org.postgresql.Driver
    url: "jdbc:postgresql://jfrog-jcr-deployment-postgresql:5432/artifactory"
    username: artifactory
    password: StrongDBPass2024

  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"

  persistence:
    enabled: true
    size: 20Gi
    storageClass: "longhorn"
    type: file-system
# --- END OF ARTIFACTORY BLOCK ---

ingress:
  enabled: true
  routerPath: /
  artifactoryPath: /artifactory/
  hosts:
    - jfrogmolmedo.support.rancher.space
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: jfrog-issuer
    cert-manager.io/issuer-kind: Issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-JFrog-Override-Base-Url $http_x_forwarded_proto://$host;
  tls:
    - secretName: artifactory-tls
      hosts:
        - jfrogmolmedo.support.rancher.space

jfconnect:
  enabled: false
