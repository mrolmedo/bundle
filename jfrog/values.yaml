# values.yaml

# ----- Database Configuration -----
postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn"

# ----- Artifactory Core Settings (SINGLE MERGED BLOCK) -----
artifactory:
  # 1. Database Connection
  database:
    type: postgresql
    driver: org.postgresql.Driver
    url: "jdbc:postgresql://jfrog-jcr-deployment-postgresql:5432/artifactory"
    username: artifactory
    password: StrongDBPass2024

  # 2. Resource allocation
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi" # Bumped to 4Gi to prevent OOM kills
      cpu: "2"

  # 3. Java options
  javaOpts:
    xms: "1g"
    xmx: "3g"

  # 4. Persistent storage (Use Longhorn!)
  persistence:
    enabled: true
    size: 20Gi # Set to your preferred 20Gi
    storageClass: "longhorn" 
    type: file-system

  # 5. Disable built-in Nginx (This stays now!)
  nginx:
    enabled: false

  # 6. Service Configuration
  service:
    type: ClusterIP

# ----- Ingress Configuration -----
ingress:
  enabled: true
  routerPath: /
  artifactoryPath: /artifactory/
  hosts:
    - jfrogmolmedo.support.rancher.space
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: jfrog-issuer
    cert-manager.io/issuer-kind: Issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # Header required when bypassing internal Nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-JFrog-Override-Base-Url $http_x_forwarded_proto://$host;
  tls:
    - secretName: artifactory-tls
      hosts:
        - jfrogmolmedo.support.rancher.space

# ----- Global Settings -----
jfconnect:
  enabled: false
