defaultNamespace: crossplane-system
apiVersion: aws.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws3-bucket-eucentral1
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-secret # This is the secret you create manually
      key: creds
---
apiVersion: s3.aws.crossplane.io/v1beta1
kind: Bucket
metadata:
  name: fleet-managed-bucket
spec:
  forProvider:
    region: eu-central-1
  providerConfigRef:
    name: aws3-bucket-eucentral1
